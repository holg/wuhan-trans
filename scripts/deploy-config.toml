# Deploy configuration for vtranslate-relay
# Edit values below to match your server

[server]
ssh_host = "iesna.eu"
server_name = "voice.rlxapi.eu"
remote_base = "/var/www/voice.rlxapi.eu"
app_name = "vtranslate-relay"
site_url = "wss://voice.rlxapi.eu"

[build]
target_triple = "x86_64-unknown-linux-gnu"

[service]
listen_addr = "127.0.0.1:3088"
db_path = "./data/conversations.db"
rust_log = "info"
